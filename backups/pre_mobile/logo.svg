<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240">
  <defs>
    <!-- Subtle texture -->
    <linearGradient id="shield-fill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0f1923"/>
    </linearGradient>
    <linearGradient id="gold-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a84c"/>
      <stop offset="50%" stop-color="#f0d078"/>
      <stop offset="100%" stop-color="#c9a84c"/>
    </linearGradient>
    <linearGradient id="gold-line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0"/>
      <stop offset="15%" stop-color="#c9a84c"/>
      <stop offset="85%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="120" cy="120" r="116" fill="url(#shield-fill)" stroke="url(#gold-accent)" stroke-width="1.5"/>
  
  <!-- Inner ring -->
  <circle cx="120" cy="120" r="105" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.3"/>

  <!-- Top decorative line -->
  <line x1="55" y1="58" x2="185" y2="58" stroke="url(#gold-line)" stroke-width="0.8"/>
  
  <!-- M & W Monogram -->
  <!-- M - left -->
  <text x="78" y="142" font-family="'Georgia', 'Times New Roman', serif" font-size="82" font-weight="400" fill="url(#gold-accent)" letter-spacing="-2">M</text>
  
  <!-- Ampersand - small, elevated -->
  <text x="120" y="108" font-family="'Georgia', 'Times New Roman', serif" font-size="22" font-style="italic" fill="#c9a84c" text-anchor="middle" opacity="0.7">&amp;</text>

  <!-- W - right, slightly overlapping -->
  <text x="118" y="142" font-family="'Georgia', 'Times New Roman', serif" font-size="82" font-weight="400" fill="url(#gold-accent)" letter-spacing="-2">W</text>
  
  <!-- Bottom decorative line -->
  <line x1="55" y1="155" x2="185" y2="155" stroke="url(#gold-line)" stroke-width="0.8"/>

  <!-- EST. tag -->
  <text x="120" y="172" font-family="'Georgia', 'Times New Roman', serif" font-size="9" fill="#c9a84c" text-anchor="middle" letter-spacing="4" opacity="0.5">TRADING HOUSE</text>

  <!-- Bottom dots -->
  <circle cx="95" cy="183" r="1.2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="120" cy="183" r="1.2" fill="#c9a84c" opacity="0.4"/>
  <circle cx="145" cy="183" r="1.2" fill="#c9a84c" opacity="0.4"/>
</svg>
