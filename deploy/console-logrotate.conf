# Rotation for the Maggy & Winston trader console capture.
#
# logs/console.log is fed by `tmux pipe-pane -> cat >> console.log` (set up in
# ~/restart-all.sh and ~/watchdog-trader.sh). It holds everything the trader
# process prints to stdout/stderr — including uvicorn/web errors and any crash
# traceback that never reaches trader.log.
#
# Runs in USER mode (no sudo). Installed as a daily cron line:
#   15 0 * * * /usr/sbin/logrotate -s /home/rain/.logrotate-console.state /home/rain/automatic_option_trader/deploy/console-logrotate.conf
#
# copytruncate is REQUIRED: the `cat >>` pipe keeps the file open, so we copy
# then truncate in place. A plain rename would leave cat writing to the old
# inode and console.log would silently stop growing.

/home/rain/automatic_option_trader/logs/console.log {
    daily
    rotate 14
    missingok
    notifempty
    copytruncate
    compress
    delaycompress
}
