# ============================================================
# Options Trader — Master Configuration
# ============================================================

app:
  name: "Options Trader"
  mode: "live"                 # "paper" | "live" — controls data type and safety features
  suggestion_mode: true        # true = suggest trades with Approve/Reject, false = auto-execute
  log_level: "INFO"            # DEBUG, INFO, WARNING, ERROR
  db_path: "data/trades.db"

ibkr:
  host: "127.0.0.1"
  port: 4001                   # Options Trader TWS on new account (7496=portfolio TWS)
  client_id: 12
  timeout: 30
  readonly: false              # LIVE: can place orders
  account: "U23886415"           # Options Trader live account (separate from portfolio)

strategy:
  # --- Put Selling ---
  dte_min: 0                   # minimum days to expiration
  dte_max: 3                   # maximum days to expiration (0-3 DTE strategy)
  delta_min: 0.08              # minimum abs delta for short puts (wider for 0-2 DTE)
  delta_max: 0.35              # maximum abs delta for short puts (wider for 0-2 DTE)
  contracts_per_stock: 1       # number of contracts per position
  min_premium: 0.10            # minimum acceptable premium ($)
  min_open_interest: 10        # minimum open interest filter
  min_bid: 0.05                # minimum bid price filter

  # --- IV Rank Filter ---
  iv_rank_enabled: true        # only sell puts when IV is elevated
  iv_rank_min: 15              # minimum IV rank percentile (lowered for 0-2 DTE)
  iv_lookback_days: 252        # ~1 year of trading days for IV percentile

  # --- Dynamic Delta (VIX-adjusted) ---
  dynamic_delta_enabled: true
  delta_vix_low: 0.15          # delta range 0.15-0.35 when VIX < 15 (calm — closer to ATM)
  delta_vix_low_max: 0.35
  delta_vix_mid: 0.10          # delta range 0.10-0.30 when VIX 15-25 (normal)
  delta_vix_mid_max: 0.30
  delta_vix_high: 0.05         # delta range 0.05-0.20 when VIX 25-30 (elevated — farther OTM)
  delta_vix_high_max: 0.20

  # --- Profit Taking / Rolling ---
  profit_take_enabled: false   # disabled for 0-2 DTE — let puts expire worthless
  profit_take_pct: 0.85        # only used if re-enabled
  roll_enabled: false          # no rolling — sell fresh puts on next scan cycle

  # --- Earnings Avoidance ---
  earnings_avoid_enabled: true # skip stocks with earnings within N days
  earnings_avoid_days: 3       # don't sell puts if earnings within this many days

  # --- Wheel (Covered Calls on assignment) ---
  wheel_enabled: true
  cc_dte_min: 5                # covered call min DTE
  cc_dte_max: 30               # covered call max DTE (wider range for smart strikes)
  cc_delta_min: 0.15           # lower delta floor for smart management
  cc_delta_max: 0.35
  cc_above_cost_basis: true    # only sell calls above cost basis
  cc_progressive_strikes: true # raise strike as stock recovers (protect upside)

  # --- Portfolio Hedge ---
  hedge_enabled: true          # buy rolling SPY OTM puts as tail hedge
  hedge_otm_pct: 0.05          # 5% out of the money
  hedge_dte_target: 30         # target DTE for hedge puts
  hedge_roll_dte: 7            # roll when DTE drops below this
  hedge_budget_pct: 0.04       # spend max 4% of collected premiums on hedges
  hedge_contracts: 1           # number of SPY put contracts

risk:
  vix_pause_threshold: 30.0    # pause ALL new trades when VIX > this
  max_portfolio_positions: 50  # hard cap on simultaneous short option positions
  max_daily_positions: 10      # base: 10 trades/day for first 100K EUR
  max_daily_positions_cap: 25  # hard cap regardless of portfolio size
  daily_position_step: 100000  # +1 trade per 100K EUR above base
  max_sector_pct: 0.30         # target 30% — adaptive: starts at 100%, tightens as NLV grows
  max_single_stock_pct: 5.00   # max 500% of portfolio in one stock (small account override)
  max_buying_power_usage: 0.60 # never use more than 60% of buying power
  max_margin_usage: 0.80       # block new trades when margin exceeds 80% of NLV
  min_cash_reserve: 10000      # always keep this much cash free ($)

  # --- SPY Moving Average Gate ---
  spy_ma_enabled: true         # enable SPY 10/20 MA crossover gate
  spy_ma_fast: 10              # fast MA period (days)
  spy_ma_slow: 20              # slow MA period (days)
  spy_bearish_reduction: 0.50  # reduce new entries to 50% when bearish (0.0 = block all)

schedule:
  market_open: "09:30"
  market_close: "16:00"
  timezone: "US/Eastern"
  scan_interval_minutes: 30    # how often to scan for new trades during market hours
  position_check_minutes: 5    # how often to check open positions
  enabled_markets: []           # empty = all markets (SMART, SWX, OSE, TSE, ASX)

web:
  host: "0.0.0.0"
  port: 8000
  reload: false

# ── Long-Term Portfolio Builder ────────────────────────────
portfolio:
  enabled: true                    # portfolio builder active
  suggestion_mode: true            # true = suggest trades with Approve/Reject, false = auto-execute
  readonly: true                   # true = read-only IBKR connection (cannot place orders)
  ibkr_host: "127.0.0.1"
  ibkr_port: 7496                  # live TWS port
  ibkr_client_id: 99               # same as portfolio scheduler (avoids stale connection on 10)
  ibkr_account: "U17562704"         # live IBKR account

  # Buy criteria
  max_single_buy_eur: 100000       # max EUR per single stock purchase
  min_single_buy_eur: 5000         # min EUR per buy (avoid unreasonable fees)
  min_discount_pct: 5.0            # min % below 200d SMA to trigger value buy
  sma_period: 200                  # 200-day moving average
  rsi_period: 14                   # RSI lookback
  rsi_oversold: 30.0               # RSI below this = oversold buy signal
  max_portfolio_pct: 0.10          # max 10% of portfolio in any single stock

  # Tier-specific overrides
  dividend_min_discount_pct: 7.0
  dividend_rsi_oversold: 25.0
  breakthrough_min_discount_pct: 3.0
  breakthrough_rsi_oversold: 35.0
  cash_reserve_pct: 0.05           # keep 5% cash reserve always

  # Market guard
  market_overbought_pct: 15.0      # SPY >15% above 200d SMA → park cash

  # Annual rescreen — December 1st, $1B+ market cap
  rescreen_month: 12               # December
  rescreen_day: 1                  # 1st
  rescreen_regions: ""             # blank = all 27 markets
  rescreen_top_n: 50
  rescreen_min_market_cap: 1000000000  # $1B minimum market cap

  # Dividend reinvestment
  reinvest_dividends: true
  min_dividend_reinvest: 50.0

  # Cash yield (earn interest on parked cash)
  cash_yield_enabled: true
  cash_yield_symbol: "SGOV"        # short-term US treasury ETF
  cash_yield_exchange: "SMART"
  cash_yield_currency: "USD"

  # Schedule
  check_interval_hours: 4          # check buy opportunities every 4 hours
  scan_hour: 10
  scan_minute: 30                # auto-reload for dev

# ── Cash Bridge (Options → Portfolio) ───────────────────────
bridge:
  enabled: false                    # enable when both accounts are live
  min_portfolio_value: 1000000      # EUR — only transfer if options account > this
  transfer_pct: 0.10                # 10% annual transfer
  transfer_month: 7                 # July
  transfer_day: 31                  # 31st
  source_account: "U23886415"        # options IBKR account ID
  target_account: "U17562704"        # portfolio IBKR account ID
  currency: "EUR"
  dry_run: true                     # safety: log but don't transfer until confirmed

# ── Alerts / Notifications ──────────────────────────────────
alerts:
  enabled: true

  # Telegram Bot (free, recommended)
  # 1. Message @BotFather on Telegram → /newbot → get token
  # 2. Message your bot, then visit:
  #    https://api.telegram.org/bot<TOKEN>/getUpdates → get chat_id
  telegram_enabled: false
  telegram_bot_token: ""            # e.g., "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
  telegram_chat_id: ""              # e.g., "123456789"

  # ntfy.sh (free, no signup — just pick a unique topic name)
  # Install ntfy app on phone, subscribe to your topic
  ntfy_enabled: true
  ntfy_topic: "Pabertiiger-1941d4d9"  # subscribed at ntfy.sh/Pabertiiger-1941d4d9
  ntfy_server: "https://ntfy.sh"

  # What to notify about
  alert_critical: true              # halts, circuit breaker, disconnects >10min
  alert_daily: true                 # end-of-day summary at 16:15 ET
  alert_trades: false               # every individual trade (noisy)
  alert_bridge: true                # annual bridge transfers
  alert_assignments: true           # put assignments

