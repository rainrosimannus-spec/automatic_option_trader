# ============================================================
# Stock Universe — Global Options Wheel Strategy
# 40 Growth Stocks + 10 Dividend Stocks
# Best projected total return over next 10 years
#
# Each stock specifies:
#   symbol          — ticker as known on the exchange
#   name            — company name
#   sector          — sector classification
#   exchange        — IBKR exchange (SMART, SBF, TSE, OSE, ASX, etc.)
#   currency        — trading currency (USD, CHF, JPY, NOK, AUD, etc.)
#   primary_exchange — (optional) primary listing exchange for disambiguation
#   contract_size   — (optional) options contract multiplier, default 100
#
# IBKR exchange codes:
#   SMART        — US smart routing (NYSE, NASDAQ, ARCA, etc.)
#   SWX / EBS    — SIX Swiss Exchange
#   TSE          — Tokyo Stock Exchange
#   OSE          — Oslo Stock Exchange (Euronext Oslo)
#   ASX          — Australian Securities Exchange
#   LSE          — London Stock Exchange
#   IBIS / FWB   — Frankfurt / Xetra
#   AEB          — Euronext Amsterdam
# ============================================================

