  - id: blackout_3day
    rank: 19
    name: "Synthetic 3-day exchange blackout + -30% gap reopen"
    category: crash
    start: "2024-01-02"
    end: "2024-07-15"
    why: "Overlays grind_2024h1's 6.5-month calm-bull window with a 3-trading-day total exchange halt mid-regime (April 15-17, 2024) followed by a -30% gap on resumption (April 18). Models the highest-priority uncovered pattern type from the black-swan brainstorm 2026-05-27: cyber attack on financial infrastructure / multi-day power outage / Carrington-scale solar event. The wheel has ~3 months of bull-deployment momentum (high IV-rank sizing → up to 10× contracts on best names) when the halt strikes; 0-3 DTE puts that expire mid-halt settle on day 4 at the -30%-gapped price, the cruelest assignment test in the suite. IV is bumped 2× on the gap bar to model the realized vol explosion on reopen."
    # Halt dates are in the regime's effective window (here = actual 2024 dates,
    # no historical_analog). The service layer drops every bar (incl ^SPY/^VIX)
    # whose date falls in [start, end] inclusive — engine sees a date-axis gap.
    halts:
      - start: "2024-04-15"
        end: "2024-04-17"
    gap_open_pct: -0.30
