regimes:
  - id: bear_2022
    rank: 1
    name: "2022 rate-hike bear market"
    category: crash
    start: "2022-01-03"
    end: "2022-10-14"
    why: "Sustained ~-25% grind. Worst case for the wheel: repeated assignments into a falling market, capital stuck in depreciating stock."

  - id: tariff_2025
    rank: 2
    name: "April 2025 tariff shock"
    category: crash
    start: "2025-04-02"
    end: "2025-04-30"
    why: "Sharp policy-driven selloff with a vol spike. Recent, severe gap-risk test."

  - id: carry_2024
    rank: 3
    name: "Aug 2024 yen carry-trade unwind"
    category: crash
    start: "2024-07-29"
    end: "2024-08-16"
    why: "VIX spike to ~65 over two sessions then snap-back. Tests a sudden vol shock + whipsaw."

  - id: svb_2023
    rank: 4
    name: "Mar 2023 SVB / regional-bank crisis"
    category: crash
    start: "2023-03-06"
    end: "2023-03-31"
    why: "Fast sector-contagion shock with a V-shaped recovery."

  - id: covid_2020
    rank: 5
    name: "COVID crash & recovery"
    category: crash
    start: "2020-02-14"
    end: "2020-06-30"
    why: "Fastest -34% in history, VIX 82. Ultimate tail/gap-risk test (just outside 5y; kept for resilience)."

  - id: chop_2023h2
    rank: 6
    name: "2023 H2 range-bound chop"
    category: sideways
    start: "2023-08-01"
    end: "2023-10-27"
    why: "Choppy sideways-to-down grind — premium-selling's home turf. Tests that the strategy actually capitalizes."

  - id: bear_rally_2022
    rank: 7
    name: "2022 summer bear-market rally"
    category: whipsaw
    start: "2022-06-16"
    end: "2022-08-16"
    why: "Sharp +17% bounce inside a bear market. Tests premature call-away / capped upside in a fakeout."

  - id: ai_2023
    rank: 8
    name: "2023 AI breakout rally"
    category: breakthrough
    start: "2023-01-03"
    end: "2023-07-31"
    why: "Concentrated AI-led uptrend. Tests capped upside when winners get called away."

  - id: bull_2021
    rank: 9
    name: "2021 reflation bull"
    category: breakthrough
    start: "2021-01-04"
    end: "2021-12-31"
    why: "Broad steady bull year. Baseline: does the strategy still hit the 24% target in easy conditions?"

  - id: grind_2024h1
    rank: 10
    name: "2024 H1 steady grind-up"
    category: breakthrough
    start: "2024-01-02"
    end: "2024-07-15"
    why: "Low-vol steady uptrend. Tests performance when premiums are compressed."

  - id: iran_war_2026
    rank: 11
    name: "2026 Iran war (US/Israel vs Iran)"
    category: geopolitical
    start: "2026-02-28"
    end: "2026-05-22"
    why: "US + Israel at war with Iran and its regional allies since 2026-02-28 — a live, vol-elevated geopolitical regime with event gaps. Overlaps the real options account's life (started ~Feb 22), which returned +22.5% — so this is the CALIBRATION ANCHOR: tune short_dte_uplift_k until the backtest here ~matches +22.5%."

  - id: dotcom_2000
    rank: 12
    name: "2000-2002 dot-com bust"
    category: crash
    start: "2000-03-10"
    end: "2002-10-09"
    why: "31-month NDX -78% grinding bear, the longest sustained tech crash. Survivorship-biased: only ~22/47 universe names existed yet (the rest IPO'd later, including the AI-era megacaps). Result must be read as 'how does the wheel behave on the SURVIVING names through a once-in-a-generation tech collapse' — not a predictor of broad outcome. Worth keeping on the dashboard for shape comparison vs bear_2022's 9-month rate-hike bear."

  - id: oil_crash_2014
    rank: 13
    name: "2014-2016 oil halving + China growth fears"
    category: sideways
    start: "2014-06-20"
    end: "2016-02-11"
    why: "20-month broad-market chop while oil collapsed $107→$26 (1/4). USD strengthening + China slowdown + August 2015 mini-crash + early-2016 selloff. SPY went ~+5% net over 20 months with two -12% corrections. Tests the wheel's ability to grind through multiple shallow corrections + survivorship pressure without a clear trend. Note: universe is tech-heavy; minimal direct oil exposure → tests SECOND-order effects (input-cost tailwind for everyone except XOM/CVX, which aren't in this universe)."

  - id: gfc_2008
    rank: 14
    name: "2008 GFC / Lehman crash"
    category: crash
    start: "2008-09-02"
    end: "2009-03-09"
    why: "Acute phase of the global financial crisis: Lehman bankruptcy (Sept 15) through SPX bottom at 676 (Mar 9). SPX -46% in 6 months, VIX peaked 80, credit markets froze. Heavy survivorship: only ~20/47 universe names existed (most modern megacaps post-date this). Read as 'how does the wheel survive a credit-freeze tail event on the names that EXISTED' — not a broad-outcome predictor. Worst-case capital-stuck-in-assigned-stock scenario."

  - id: q4_2018
    rank: 15
    name: "2018 Q4 Powell-pivot selloff"
    category: crash
    start: "2018-10-01"
    end: "2018-12-31"
    why: "SPX -19.8% in 3 months on a hawkish-Fed surprise, bottoming Christmas Eve. Faster than bear_2022 (3mo vs 9mo), shallower than tariff_2025. Full universe except recent IPOs (HWM, ARM, PLTR, ABNB). Clean rapid-crash test for the wheel's assignment cadence — does it get caught with full collateral deployed near the top?"

  - id: volmageddon_2018
    rank: 16
    name: "Feb 2018 Volmageddon / XIV blowup"
    category: crash
    start: "2018-01-22"
    end: "2018-03-09"
    why: "Pure short-vol shock from a clean uptrend: VIX 17→50 in two sessions (Feb 5-6), XIV ETN blew up, SPX -10% in 9 days then chopped. Window padded to ~6 weeks so the wheel has time to enter, get shocked, and recover. Tests the strategy's vol-spike response when ENTERED into low vol (opposite of carry_2024 which spiked from already-elevated levels)."

  - id: debt_2011
    rank: 17
    name: "2011 US debt downgrade + Eurozone crisis"
    category: crash
    start: "2011-07-22"
    end: "2011-10-31"
    why: "S&P downgrade of US credit (Aug 5) + Eurozone sovereign-debt fears. SPX -19% in 3 weeks (Jul-Aug), VIX 48, then 2 months of choppy basing before recovery. Crisis-grade vol WITHOUT recession — tests whether the wheel can re-engage premium-selling as the storm passes. Universe thin (~25/47 names existed) — read with survivorship caveat."

  - id: flash_2010
    rank: 18
    name: "May 2010 Flash Crash"
    category: whipsaw
    start: "2010-04-23"
    end: "2010-07-02"
    why: "Intraday liquidity collapse on May 6 (Dow -9% intraday, snap-back same session) inside a broader Apr-Jul selloff (SPX -16% peak-to-trough). Daily-bar backtests can't replicate the intraday event itself, but the surrounding window tests gap risk + the wheel's behavior through a non-fundamental liquidity shock. Universe ~22/47 names — keep on dashboard for shape comparison, not absolute returns."

  - id: ai_crash
