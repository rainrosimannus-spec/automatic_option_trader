  - id: stagflation_70s
    rank: 20
    name: "1973-1982 stagflation (Volcker era)"
    category: crash
    start: "1973-01-02"
    end: "1982-12-31"
    why: "10-year survival test through the worst decade of US equities since WW2: 1973-74 bear (-48% SPX), 1979-1982 second oil shock + Volcker's 20% rate hikes + double-dip recession. Real returns were ~-50% over the decade once inflation is netted out (nominal returns ~0%). Today's universe is mapped onto 1970s blue-chips (IBM/INTC for tech, T/DIS for communication, MCD/F for consumer, KO/PG for staples, JNJ/MRK/PFE/LLY for healthcare, XOM for energy, BA/CAT/MMM for industrials) via proxy_universe — 14 unique 1970s names back the 47-name universe. Prices are scaled ×7.5 (1973→2024 CPI ratio) so the engine sees today-scale dollar levels while day-over-day RETURNS remain identical to history; this keeps the wheel's premium minimums + $4M NLV scale meaningful. LIMITATIONS: (1) ^VIX silently skipped (instrument didn't exist pre-1990; VIX-tier delta/halt/bull-regime gates no-op, engine falls back to fixed 0.15-0.30 delta), (2) ^SPY data unavailable pre-1993 (SPY-MA200/MA50 gates no-op, fail-open), (3) NOMINAL returns only — real (inflation-adjusted) view not yet implemented (CPI tracking is the follow-up). Despite limits, the wheel still sees real per-name vol via the realized-vol IV proxy, so iv_rank ladder sizing adapts."
    price_multiplier: 7.5
    # Proxy_universe: map all 47 today-names to 14 unique 1970s blue-chips with
    # Yahoo data back to 1973. LLY and MCD existed in 1973 with their own Yahoo
    # data (not proxied — fetched as-is). All other today-names route through
    # one of: IBM, INTC, T, DIS, KO, PG, MCD, F, JNJ, MRK, PFE, XOM, BA, CAT, MMM.
    proxy_universe:
      # Tech (large-cap) → IBM
      AAPL: IBM
      ADBE: IBM
      ADSK: IBM
      CDNS: IBM
      CRM: IBM
      MSFT: IBM
      NOW: IBM
      ORCL: IBM
      PLTR: IBM
      VEEV: IBM
      # Tech (semis / hardware) → INTC
      AMD: INTC
      ANET: INTC
      ARM: INTC
      ASML: INTC
      AVGO: INTC
      FSLR: INTC
      KLAC: INTC
      LRCX: INTC
      MPWR: INTC
      NVDA: INTC
      QCOM: INTC
      # Communication → T / DIS
      GOOGL: T
      META: DIS
      NFLX: DIS
      # Consumer Discretionary
      ABNB: MCD
      BKNG: MCD
      CMG: MCD
      DECK: F
      LULU: F
      RACE: F
      CPRT: F
      # Consumer Staples
      COST: KO
      MA: KO          # no 1970s payments analog → defensive staple proxy
      V: KO
      # Healthcare
      AZN: MRK
      DXCM: JNJ
      IDXX: JNJ
      ISRG: JNJ
      SYK: JNJ
      VRTX: MRK
      ZTS: MRK
      # Industrials
