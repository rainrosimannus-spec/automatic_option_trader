# ============================================================
# Structural Risk Flags — per-stock risk assessment
# ============================================================
# Each risk is rated: none, low, medium, high
#
# Risk categories:
#   ai_disruption:   AI/LLMs threaten the core business model
#   regulatory:      Antitrust, regulation, or policy risk
#   geopolitical:    China/Taiwan/sanctions exposure
#   single_product:  Revenue depends on one product/customer
#   profitability:   Still unprofitable, cash burn risk
#
# Penalty per level: none=0, low=5, medium=10, high=20
# Total penalty is subtracted from composite buy score
# A stock with 60 composite score and 20 penalty → effective 40
# ============================================================

