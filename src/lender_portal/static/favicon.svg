<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" role="img" aria-label="MesiCap">
  <title>MesiCap</title>
  <!-- Hexagon paw, centered in a 160x160 square. Hexagon spans x=15..145, y=5..155 -->

  <!-- Outer hexagon -->
  <polygon points="80,5 145,42.5 145,117.5 80,155 15,117.5 15,42.5" fill="#E8A526"/>
  <!-- Inner hexagon highlight -->
  <polygon points="80,23 130,51.5 130,108.5 80,137 30,108.5 30,51.5" fill="#F7C948"/>
  <!-- Paw print: main pad -->
  <path d="M 80 115 Q 60 115 55 100 Q 52 85 65 77 Q 80 70 95 77 Q 108 85 105 100 Q 100 115 80 115 Z" fill="#2B1810"/>
  <!-- Toe pads -->
  <ellipse cx="58" cy="63" rx="8" ry="11" fill="#2B1810"/>
  <ellipse cx="72" cy="53" rx="8" ry="11" fill="#2B1810"/>
  <ellipse cx="88" cy="53" rx="8" ry="11" fill="#2B1810"/>
  <ellipse cx="102" cy="63" rx="8" ry="11" fill="#2B1810"/>
</svg>
