<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200" role="img" aria-label="MesiCap Technologies">
  <title>MesiCap Technologies</title>

  <!-- Hexagon paw on the left, vertically centered -->
  <g transform="translate(40, 25)">
    <!-- Outer hexagon -->
    <polygon points="80,0 145,37.5 145,112.5 80,150 15,112.5 15,37.5" fill="#E8A526"/>
    <!-- Inner hexagon highlight -->
    <polygon points="80,18 130,46.5 130,103.5 80,132 30,103.5 30,46.5" fill="#F7C948"/>
    <!-- Paw print: main pad -->
    <path d="M 80 110 Q 60 110 55 95 Q 52 80 65 72 Q 80 65 95 72 Q 108 80 105 95 Q 100 110 80 110 Z" fill="#2B1810"/>
    <!-- Toe pads -->
    <ellipse cx="58" cy="58" rx="8" ry="11" fill="#2B1810"/>
    <ellipse cx="72" cy="48" rx="8" ry="11" fill="#2B1810"/>
    <ellipse cx="88" cy="48" rx="8" ry="11" fill="#2B1810"/>
    <ellipse cx="102" cy="58" rx="8" ry="11" fill="#2B1810"/>
  </g>

  <!-- Wordmark on the right, vertically centered around y=100 -->
  <text x="225" y="108" font-family="Helvetica, Arial, sans-serif" font-weight="500" font-size="56" text-anchor="start">
    <tspan fill="#B8721A">Mesi</tspan><tspan fill="#2B1810">Cap</tspan>
  </text>

  <!-- Tagline beneath, left-aligned with wordmark -->
  <text x="227" y="138" font-family="Helvetica, Arial, sans-serif" font-size="14" letter-spacing="5" text-anchor="start" fill="#666666">TECHNOLOGIES</text>
</svg>
