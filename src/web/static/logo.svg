<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <title>Maggy &amp; Winston — Primary Mark</title>
  <desc>Stacked monogram. Navy M above, gold W below, divided by a gold rule. The Stack.</desc>
  <!-- Outer frame, double-line -->
  <rect x="10" y="10" width="180" height="180" fill="none" stroke="#0E1B2E" stroke-width="3"/>
  <rect x="20" y="20" width="160" height="160" fill="none" stroke="#0E1B2E" stroke-width="1"/>
  <!-- Gold divider -->
  <line x1="28" y1="100" x2="172" y2="100" stroke="#B08D3A" stroke-width="2"/>
  <!-- M (top, navy) -->
  <path d="M 38 30 L 38 92 L 56 92 L 56 50 L 84 92 L 92 92 L 100 92 L 108 92 L 116 92 L 144 50 L 144 92 L 162 92 L 162 30 L 144 30 L 100 80 L 56 30 Z" fill="#0E1B2E"/>
  <!-- W (bottom, gold) -->
  <path d="M 38 170 L 38 108 L 56 108 L 56 150 L 84 108 L 92 108 L 100 108 L 108 108 L 116 108 L 144 150 L 144 108 L 162 108 L 162 170 L 144 170 L 100 120 L 56 170 Z" fill="#B08D3A"/>
  <!-- Center locking diamond -->
  <polygon points="100,94 108,100 100,106 92,100" fill="#0E1B2E"/>
</svg>
